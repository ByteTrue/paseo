feature: 2026-06-11-custom-provider-form
created: 2026-06-11

steps:
  - action: "micro-refactor: 创建 use-custom-provider-form.ts 和 custom-provider-form.tsx 骨架"
    exit_signal: "两个新文件存在，typecheck 通过，providers-section.tsx 无行为变化"
    status: done

  - action: "static structure: CustomProviderForm 组件骨架 + 表单字段布局"
    exit_signal: "点击 'Add custom provider' 展开表单，所有字段可见可交互"
    status: done

  - action: "interaction logic: 表单校验 + buildExtendsProviderConfigPatch + 提交流程"
    exit_signal: "合法输入提交后 patchConfig 被调用；非法输入显示 inline error"
    status: done

  - action: "state integration: 成功后 refresh snapshot + 新 provider 出现在列表中"
    exit_signal: "新 provider 在列表中显示正确的 status/model count"
    status: done

  - action: "edge cases + polish: 重复 id 拦截、env var 空行过滤、loading 状态、Cancel 行为、disallowedTools 条件显示"
    exit_signal: "所有 acceptance scenario 有正确的 UI 反馈"
    status: done

  - action: "test coverage: buildExtendsProviderConfigPatch 单元测试 + providers-section 集成测试"
    exit_signal: "测试通过，覆盖 key scenarios 中的正常/边界/错误路径"
    status: done

