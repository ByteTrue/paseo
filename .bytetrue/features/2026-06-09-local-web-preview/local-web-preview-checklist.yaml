      - Web BrowserPane no longer shows desktop-only placeholder.
      - Blocked fallback is covered with a controlled URL or mocked page when practical.

  - id: S7
    title: Final docs and verification
    status: done
    paradigm: cleanup
    summary: Update docs and run targeted checks.
