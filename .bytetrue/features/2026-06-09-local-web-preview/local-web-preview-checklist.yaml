      - packages/app/src/stores/browser-store/index.ts
    checks:
      - Address bar supports http/https input.
      - Iframe updates from browser store URL state.
      - Refresh, copy URL, and Open in new tab controls are present.
      - file/javascript/custom schemes remain blocked.

  - id: S5
    title: Refactor preview URL and iframe state helpers
    status: done
    paradigm: refactor
    summary: Extract URL validation and iframe state helpers to keep Web BrowserPane maintainable.
    files:
      - packages/app/src/components/browser-pane.web.tsx
      - packages/app/src/components/browser-pane.web.test.tsx
    checks:
      - Component complexity stays within lint limits.
      - Helper tests cover URL normalization and blocked timeout behavior.

  - id: S6
    title: Add browser local preview e2e smoke
    status: done
    paradigm: red-green
    summary: Verify Web browser tab entry and iframe preview in Playwright.
    files:
