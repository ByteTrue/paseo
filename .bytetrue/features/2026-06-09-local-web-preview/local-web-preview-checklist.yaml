steps:
  - id: S1
    title: Write browser entry parity tests
    status: done
    paradigm: red
    summary: Cover Web visibility for New browser tab and running-service Open in browser tab.
    files:
      - packages/app/src/screens/workspace/workspace-screen.tsx
      - packages/app/src/screens/workspace/workspace-scripts-button.tsx
      - packages/app/src/screens/workspace/workspace-scripts-button.test.tsx
    checks:
      - Web does not hide all browser-tab entry points behind getIsElectron().
      - Running service can create a browser tab on Web.

  - id: S2
    title: Write Web BrowserPane lite preview tests
    status: done
    paradigm: red
    summary: Cover Web BrowserPane empty state, URL entry, iframe src, blocked fallback, and Open in new tab.
    files:
      - packages/app/src/components/browser-pane.web.tsx
      - packages/app/src/components/browser-pane.web.test.tsx
    checks:
      - Empty browser tabs render a useful URL entry state.
      - http/https URLs render into an iframe.
      - unsupported URLs are rejected.
      - blocked/timeout state offers Open in new tab.

  - id: S3
    title: Enable Web browser entry parity
    status: done
    paradigm: green
    summary: Allow Web to create browser tabs through existing entry points while keeping Electron behavior unchanged.
    files:
      - packages/app/src/screens/workspace/workspace-screen.tsx
      - packages/app/src/screens/workspace/workspace-scripts-button.tsx
      - packages/app/src/utils/workspace-script-links.ts
    checks:
      - Web shows New browser tab where the client currently exposes browser tabs.
      - handleOpenUrlInBrowserTab creates a Web lite preview tab instead of returning on non-Electron.
      - Electron still opens the complete BrowserPane implementation.

  - id: S4
    title: Implement Web BrowserPane lite preview
    status: done
    paradigm: green
    summary: Replace the Web desktop-only placeholder with iframe-based preview UI.
    files:
