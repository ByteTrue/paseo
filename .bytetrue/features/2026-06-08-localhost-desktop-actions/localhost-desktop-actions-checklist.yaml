design: localhost-desktop-actions-design.md
status: done
steps:
  - id: protocol-local-os-fs
    title: Add protocol contracts for local OS and FS actions
    status: done
    exit_signal: Protocol schemas parse the new feature flag, open-target RPCs, local-fs RPCs, and remain backward-compatible with old server_info payloads.
  - id: server-local-safety-gate
    title: Add daemon-side local connection safety gate
    status: done
    exit_signal: Local OS/FS RPC handlers can allow loopback/direct localhost requests and reject relay or non-loopback requests before spawn or filesystem reads.
  - id: server-open-targets
    title: Implement daemon-backed editor and file-manager targets
    status: done
    exit_signal: Daemon can list available editor/file-manager targets, validate paths and target ids, and launch or reveal paths with clear errors for unavailable targets.
  - id: server-directory-picker
    title: Implement daemon-backed directory picker data
    status: done
    exit_signal: Daemon can return directory roots and child directory entries, including parent paths, hidden flags, and readable errors for invalid or inaccessible paths.
  - id: app-open-targets
    title: Connect workspace open targets to Electron or localhost daemon sources
    status: done
    exit_signal: Workspace open target UI uses Electron bridge on desktop, daemon-backed targets for browser localhost, and keeps remote/GitHub behavior unchanged.
  - id: app-directory-picker
    title: Add browser-localhost directory picker for Open Project
    status: done
    exit_signal: Open Project uses native directory dialog on Electron, daemon-backed directory picker on browser localhost, and existing Project Picker fallback elsewhere.
  - id: verification
    title: Verify scope, tests, typecheck, and lint
    status: done
    exit_signal: Targeted tests pass, typecheck and lint pass, and manual smoke verifies at least one editor/file-manager target plus selecting a real project directory.
