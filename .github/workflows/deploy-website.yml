name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
      - "public-docs/**"
      - "packages/website/**"
      - "package.json"
      - "package-lock.json"
      - "patches/**"
      - ".github/workflows/deploy-website.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'release' || (!github.event.release.prerelease && !github.event.release.draft) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include-workspace-root --include=optional

      - name: Install Tailwind native binding
        run: |
          oxide_version="$(node -e \"console.log(require('./node_modules/@tailwindcss/oxide/package.json').version)\")"
          npm install --no-save "@tailwindcss/oxide-linux-x64-gnu@${oxide_version}"

      - name: Typecheck
        run: npm run typecheck --workspace=@bytetrue/website

      - name: Deploy to Cloudflare Workers
        run: npm run deploy --workspace=@bytetrue/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
